<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Verora Balloon Shop</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{SITE_URL}}/blog/{{SLUG}}/">

  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:url" content="{{SITE_URL}}/blog/{{SLUG}}/">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:site_name" content="Verora Balloon Shop">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE}}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{TITLE}}",
    "description": "{{DESCRIPTION}}",
    "image": "{{OG_IMAGE}}",
    "datePublished": "{{DATE_ISO}}",
    "url": "{{SITE_URL}}/blog/{{SLUG}}/",
    "author": { "@type": "Organization", "name": "Verora Balloon Shop" },
    "publisher": {
      "@type": "Organization",
      "name": "Verora Balloon Shop",
      "logo": { "@type": "ImageObject", "url": "{{SITE_URL}}/assets/favicon.svg" }
    }
  }
  </script>

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Kanit:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── Article-specific styles ── */
    .article-wrap {
      width: min(var(--max-width), calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 5rem;
    }
    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      transition: color 200ms;
    }
    .article-back:hover { color: var(--text); }

    .article-header {
      margin-bottom: 2.5rem;
    }
    .article-header h1 {
      margin: 0.75rem 0 1rem;
      max-width: 22ch;
    }
    .article-header .lede {
      margin-top: 0;
      font-size: 1.08rem;
    }

    .article-hero {
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: 2.5rem;
      box-shadow: var(--shadow);
    }
    .article-hero img {
      width: 100%;
      max-height: 520px;
      object-fit: cover;
      display: block;
    }

    .article-body {
      padding: 2.5rem 3rem;
    }
    .article-body h2 {
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      margin: 2rem 0 0.9rem;
    }
    .article-body h3 {
      font-size: 1.55rem;
      margin: 1.6rem 0 0.7rem;
    }
    .article-body p {
      margin: 0 0 1.2rem;
      line-height: 1.9;
      color: var(--muted);
      font-size: 1.05rem;
    }
    .article-body ul,
    .article-body ol {
      padding-left: 1.5rem;
      margin: 0 0 1.2rem;
    }
    .article-body li {
      line-height: 1.85;
      color: var(--muted);
      margin-bottom: 0.35rem;
      font-size: 1.02rem;
    }
    .article-body img {
      width: 100%;
      border-radius: var(--radius-lg);
      margin: 1.5rem 0;
      box-shadow: var(--shadow);
    }
    .article-body blockquote {
      margin: 1.5rem 0;
      padding: 1.2rem 1.5rem;
      border-left: 3px solid var(--pink-strong);
      background: rgba(247, 215, 222, 0.14);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      font-style: italic;
      color: var(--muted);
    }
    .article-body strong { color: var(--text); }
    .article-body a { color: var(--gold); text-decoration: underline; text-underline-offset: 3px; }

    .article-cta {
      margin-top: 3rem;
      padding: 2rem;
      border-radius: var(--radius-xl);
      text-align: center;
      background: linear-gradient(135deg, rgba(247, 215, 222, 0.28), rgba(237, 218, 188, 0.22));
      border: 1px solid rgba(255, 255, 255, 0.82);
    }
    .article-cta h3 { font-size: 2rem; margin-bottom: 0.6rem; }
    .article-cta p  { color: var(--muted); margin: 0 0 1.4rem; font-size: 1rem; }

    @media (max-width: 820px) {
      .article-body { padding: 1.4rem; }
      .article-header h1 { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <nav class="nav-bar">
        <a class="brand" href="/" aria-label="หน้าแรก Verora Balloon Shop">
          <img class="brand-logo" src="/assets/verora-balloon-mark.svg" alt="โลโก้ Verora Balloon Shop">
          <span class="brand-lockup">
            <strong>Verora</strong>
            <span>Balloon Shop</span>
          </span>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu" aria-label="เปิดหรือปิดเมนู">
          <span></span><span></span>
        </button>
        <div class="nav-menu" id="nav-menu">
          <a href="/#gallery">ผลงาน</a>
          <a href="/#directory">หมวดบริการ</a>
          <a href="/blog/">บทความ</a>
          <a href="/#contact">ติดต่อ</a>
          <a class="button button-soft" href="https://line.me/R/ti/p/@3855tjmjc" target="_blank" rel="noopener noreferrer">LINE OA</a>
        </div>
      </nav>
    </header>

    <main>
      <div class="article-wrap">
        <a class="article-back" href="/blog/">← บทความทั้งหมด</a>

        <header class="article-header reveal">
          <p class="eyebrow"><time datetime="{{DATE_ISO}}">{{DATE}}</time></p>
          <h1>{{TITLE}}</h1>
          <p class="lede">{{DESCRIPTION}}</p>
        </header>

        {{HERO_IMAGE}}

        <article class="article-body glass-panel reveal">
          {{CONTENT}}
        </article>

        <div class="article-cta reveal">
          <h3>สนใจตกแต่งงานด้วยลูกโป่ง?</h3>
          <p>ส่งรายละเอียดงานมาให้เราช่วยแนะนำแพ็กเกจที่เหมาะกับงานของคุณ</p>
          <div style="display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap">
            <a class="button button-primary" href="/#contact">ติดต่อจองงาน</a>
            <a class="button button-ghost" href="https://line.me/R/ti/p/@3855tjmjc" target="_blank" rel="noopener noreferrer">LINE OA</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <a class="line-float" href="https://line.me/R/ti/p/@3855tjmjc" target="_blank" rel="noopener noreferrer" aria-label="เปิด LINE OA">
    <span class="line-float-label">LINE OA</span>
    <strong>@3855tjmjc</strong>
  </a>

  <script>
    const navToggle = document.querySelector('.nav-toggle');
    const navMenu   = document.querySelector('.nav-menu');
    if (navToggle && navMenu) {
      navToggle.addEventListener('click', () => {
        const isOpen = navMenu.classList.toggle('is-open');
        navToggle.setAttribute('aria-expanded', String(isOpen));
      });
    }
  </script>
</body>
</html>
