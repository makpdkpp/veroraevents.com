  <link rel="stylesheet" href="/styles.css">
  <style>
    .blog-wrap {
      width: min(var(--max-width), calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 5rem;
    }
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 360px), 1fr));
      gap: 1.4rem;
      margin-top: 2.5rem;
    }
    .blog-card {
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 240ms var(--ease), box-shadow 240ms var(--ease);
    }
    .blog-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .blog-card-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    .blog-card-img--placeholder {
      background: linear-gradient(135deg, rgba(247, 215, 222, 0.5), rgba(237, 218, 188, 0.4));
    }
    .blog-card-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      flex: 1;
    }
    .blog-card-body h2 {
      font-size: 1.75rem;
      line-height: 1.3;
    }
    .blog-card-body h2 a {
      color: inherit;
      text-decoration: none;
    }
    .blog-card-body h2 a:hover { color: var(--gold); }
    .blog-card-body p {
      color: var(--muted);
      line-height: 1.75;
      font-size: 0.97rem;
      margin: 0;
      flex: 1;
    }
    .blog-card-body .button {
      align-self: flex-start;
      margin-top: 0.5rem;
      font-size: 0.88rem;
      padding: 0.7rem 1.2rem;
    }
    .no-posts {
      color: var(--muted);
      text-align: center;
      padding: 4rem 0;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <nav class="nav-bar">
        <a class="brand" href="/" aria-label="หน้าแรก Verora Balloon Shop">
          <img class="brand-logo" src="/assets/verora-balloon-mark.svg" alt="โลโก้ Verora Balloon Shop">
          <span class="brand-lockup">
            <strong>Verora</strong>
            <span>Balloon Shop</span>
          </span>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu" aria-label="เปิดหรือปิดเมนู">
          <span></span><span></span>
        </button>
        <div class="nav-menu" id="nav-menu">
          <a href="/#gallery">ผลงาน</a>
          <a href="/#directory">หมวดบริการ</a>
          <a href="/blog/" aria-current="page">บทความ</a>
          <a href="/#contact">ติดต่อ</a>
          <a class="button button-soft" href="https://line.me/R/ti/p/@3855tjmjc" target="_blank" rel="noopener noreferrer">LINE OA</a>
        </div>
      </nav>
    </header>

    <main>
      <div class="blog-wrap">
        <div class="section-heading reveal">
          <div>
            <p class="eyebrow">บทความและไอเดีย</p>
            <h1>ไอเดียและเคล็ดลับตกแต่งลูกโป่ง</h1>
            <p>เรื่องราว ไอเดีย และแรงบันดาลใจสำหรับงานที่คุณกำลังวางแผน</p>
          </div>
        </div>

        <div class="blog-grid">
          {{POSTS}}
        </div>
      </div>
    </main>
  </div>

  <a class="line-float" href="https://line.me/R/ti/p/@3855tjmjc" target="_blank" rel="noopener noreferrer" aria-label="เปิด LINE OA">
    <span class="line-float-label">LINE OA</span>
    <strong>@3855tjmjc</strong>
  </a>

  <script>
    const navToggle = document.querySelector('.nav-toggle');
    const navMenu   = document.querySelector('.nav-menu');
    if (navToggle && navMenu) {
      navToggle.addEventListener('click', () => {
        const isOpen = navMenu.classList.toggle('is-open');
        navToggle.setAttribute('aria-expanded', String(isOpen));
      });
    }
  </script>
</body>
</html>
