name: Build · Social Post

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build article pages
        run: node build.mjs

      - name: Commit built pages back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/
          git diff --staged --quiet || git commit -m "build: regenerate blog pages [skip ci]"
          git push

      - name: Detect new article
        id: detect
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            NEW=$(git diff HEAD~1 HEAD --name-only --diff-filter=A -- '_posts/*.md' | head -1)
          else
            NEW=$(git ls-files '_posts/*.md' | head -1)
          fi
          echo "file=$NEW" >> $GITHUB_OUTPUT
          [ -n "$NEW" ] && echo "found=true" >> $GITHUB_OUTPUT || echo "found=false" >> $GITHUB_OUTPUT

      - name: Post to Facebook & Instagram
        if: steps.detect.outputs.found == 'true'
        env:
          FB_PAGE_ID:           ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_USER_ID:           ${{ secrets.IG_USER_ID }}
          SITE_URL:             https://veroraevents.com
        run: node social-post.mjs "${{ steps.detect.outputs.file }}"
